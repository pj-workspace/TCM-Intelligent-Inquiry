server:
  port: 8080

spring:
  application:
    name: tcm-inquiry-backend
  datasource:
    url: jdbc:sqlite:file:./data/tcm-inquiry.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        connection:
          foreign_keys: true
  mvc:
    async:
      request-timeout: 600000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  ai:
    ollama:
      base-url: http://localhost:11434
      # 默认对话模型（主 ChatModel Bean，由自动配置注册）
      chat:
        options:
          model: deepseek-r1:8b
      # 嵌入模型（EmbeddingModel / SimpleVectorStore）
      embedding:
        options:
          model: bge-m3:latest
      # 视觉对话模型名：第二路 ChatModel 在 AiConfig（bean: visionChatModel）中显式配置为 qwen3-vl:2b

tcm:
  api:
    # 生产环境请使用 spring.profiles.active=prod 或显式设为 false，避免 500 响应泄露内部异常信息
    expose-error-details: true
    # 生产环境请改为具体来源，例如 https://app.example.com
    cors-allowed-origin-patterns:
      - "*"
  knowledge:
    # TokenTextSplitter：单块约 tokens，重叠越小切块越碎
    chunk-size: 512
    min-chunk-size-chars: 60
    min-chunk-length-to-embed: 20
    max-num-chunks: 5000
    keep-separator: true
    default-top-k: 4
    default-similarity-threshold: 0.0
    storage-dir: data/kb-files
  literature:
    storage-dir: data/literature-files
  # 视觉 ChatModel Bean（AiConfig）使用的 Ollama 模型名；CI 可通过 profile 覆盖为轻量模型
  ollama:
    vision-model: qwen3-vl:2b
