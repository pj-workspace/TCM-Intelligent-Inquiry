server:
  port: 8080

spring:
  application:
    name: tcm-inquiry-backend
  datasource:
    url: jdbc:sqlite:file:./data/tcm-inquiry.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        connection:
          foreign_keys: true
  mvc:
    async:
      request-timeout: 600000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  ai:
    ollama:
      base-url: http://localhost:11434
      # 默认对话模型（主 ChatModel Bean，由自动配置注册）
      chat:
        options:
          model: deepseek-r1:8b
      # 嵌入模型（EmbeddingModel / SimpleVectorStore）
      embedding:
        options:
          model: bge-m3:latest
      # 视觉对话模型名：第二路 ChatModel 在 AiConfig（bean: visionChatModel）中显式配置为 qwen3-vl:2b

tcm:
  knowledge:
    # TokenTextSplitter：单块约 tokens，重叠越小切块越碎
    chunk-size: 512
    min-chunk-size-chars: 60
    min-chunk-length-to-embed: 20
    max-num-chunks: 5000
    keep-separator: true
    default-top-k: 4
    default-similarity-threshold: 0.0
    storage-dir: data/kb-files
