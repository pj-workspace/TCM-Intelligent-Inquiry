# 集成测试 profile（@ActiveProfiles("ci")）：H2 文件库 + 内存向量；不依赖 MySQL/Redis
# 真机联网验证请设置环境变量 DASHSCOPE_LIVE=true 与有效 DASHSCOPE_API_KEY
spring:
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:h2:file:./target/tcm-ci-dashscope-it;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:ci-dummy-key-not-for-real-calls}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-turbo
      embedding:
        options:
          model: text-embedding-v4

tcm:
  dashscope:
    vision-model: qwen-vl-plus
  literature:
    cleanup-enabled: false
