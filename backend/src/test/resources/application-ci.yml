# Ollama 真机集成测试（@ActiveProfiles("ci")）：H2 文件库 + 内存向量；不依赖 MySQL/Redis
spring:
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:h2:file:./target/tcm-ci-ollama-it;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  ai:
    ollama:
      base-url: http://127.0.0.1:11434
      chat:
        options:
          model: tinyllama
      embedding:
        options:
          model: nomic-embed-text

tcm:
  ollama:
    vision-model: tinyllama
  literature:
    # 集成测试 profile 下关闭定时清理，避免侧效；TTL 字段仍可由业务写入
    cleanup-enabled: false
