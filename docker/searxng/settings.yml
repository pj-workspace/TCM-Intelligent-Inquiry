# 本地开发：启用 JSON API 供后端 Agent 工具调用（合并官方默认配置）
# 文档：https://docs.searxng.org/admin/settings/settings.html#use-default-settings
use_default_settings: true

server:
  secret_key: "tcm-dev-searxng-change-me-in-production-32chars-minimum"
  bind_address: "0.0.0.0"
  limiter: false
  base_url: false

search:
  formats:
    - html
    - json

# 单引擎出网：不宜过长，否则在断网/无 VPN 时用户要等很久才看到失败。
# 需要更久可在本机加 SEARXNG_TIMEOUT_SECONDS 与下面一并略调大。
outgoing:
  request_timeout: 8.0

# 上游默认 disabled: true；国内环境可开启，与公网引擎互补
engines:
  - name: baidu
    disabled: false
